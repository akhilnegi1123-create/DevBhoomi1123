<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset — DevBhoomi Travels</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a3c1a 0%, #2e7d32 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h2 { color: #2e7d32; font-size: 22px; }
    .logo p  { color: #666; font-size: 13px; margin-top: 4px; }
    h3 { color: #222; font-size: 18px; margin-bottom: 20px; text-align: center; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 5px; font-weight: 600; }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #2e7d32; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover   { background: #1b5e20; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }
    .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .msg.error   { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block; }
    .back { text-align: center; margin-top: 18px; font-size: 13px; }
    .back a { color: #2e7d32; text-decoration: none; font-weight: 600; }
    .hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h2>🏔 DevBhoomi Travels</h2>
      <p>Uttarakhand ka Safar, Hamare Saath</p>
    </div>
    <h3>Naya Password Set Karein</h3>

    <label for="password">Naya Password</label>
    <input type="password" id="password" placeholder="Kam se kam 8 characters" autocomplete="new-password"/>

    <label for="confirm">Password Confirm Karein</label>
    <input type="password" id="confirm" placeholder="Password dobara likhein" autocomplete="new-password"/>
    <p class="hint">Password mein letter (A-Z) aur number (0-9) dono hone chahiye.</p>

    <button class="btn" id="resetBtn" onclick="resetPassword()">Password Reset Karein</button>
    <div class="msg" id="msg"></div>

    <div class="back"><a href="/index.html">← Wapas Home Par Jaayein</a></div>
  </div>

  <script>
    // Extract token and email from URL params
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const email  = params.get('email');

    if (!token || !email) {
      document.getElementById('msg').className = 'msg error';
      document.getElementById('msg').textContent = 'Invalid reset link. Dobara forgot password try karein.';
      document.getElementById('resetBtn').disabled = true;
    }

    async function resetPassword() {
      const password = document.getElementById('password').value.trim();
      const confirm  = document.getElementById('confirm').value.trim();
      const msgEl    = document.getElementById('msg');
      const btn      = document.getElementById('resetBtn');

      msgEl.className = 'msg';
      msgEl.textContent = '';

      if (!password || !confirm) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Dono fields bharna zaroori hai.';
        return;
      }
      if (password !== confirm) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Dono passwords match nahi kar rahe.';
        return;
      }
      if (password.length < 8 || !/[A-Za-z]/.test(password) || !/[0-9]/.test(password)) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Password kam se kam 8 characters ka hona chahiye aur letter + number dono ho.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Wait karein...';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, token, newPassword: password })
        });
        const data = await res.json();

        if (data.success) {
          msgEl.className = 'msg success';
          msgEl.textContent = data.message + ' 3 seconds mein login page par redirect ho rahe hain...';
          setTimeout(() => { window.location.href = '/index.html'; }, 3000);
        } else {
          msgEl.className = 'msg error';
          msgEl.textContent = data.message || 'Kuch galat ho gaya. Dobara try karein.';
          btn.disabled = false;
          btn.textContent = 'Password Reset Karein';
        }
      } catch {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Server se connection nahi ho paya. Dobara try karein.';
        btn.disabled = false;
        btn.textContent = 'Password Reset Karein';
      }
    }
  </script>
</body>
</html>
